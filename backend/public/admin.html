<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Civic Puzzle Admin</title>
  <style>
    body { font-family: Arial, sans-serif; background:#0b1220; color:#e2e8f0; padding:24px; }
    .card { max-width: 720px; margin:0 auto; background:#0f172a; border:1px solid rgba(148,163,184,.2); border-radius:16px; padding:20px; }
    h1 { margin:0 0 10px; }
    label { display:block; margin-top:14px; font-weight:700; }
    input, textarea { width:100%; margin-top:6px; padding:10px; border-radius:10px; border:1px solid rgba(148,163,184,.25); background:#020617; color:#fff; }
    textarea { min-height: 90px; }
    button { margin-top:16px; padding:12px 14px; border-radius:12px; border:none; background:#7c3aed; color:white; font-weight:800; cursor:pointer; }
    button:disabled { opacity:0.6; cursor:not-allowed; }
    .msg { margin-top:14px; padding:12px; border-radius:12px; background:rgba(148,163,184,.1); border:1px solid rgba(148,163,184,.2); white-space:pre-wrap; }
    .row { display:flex; gap:12px; }
    .row > div { flex:1; }
    .hint { color:#94a3b8; font-size: 12px; margin-top:6px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🧩 Civic Puzzle Admin</h1>
    <div class="hint">This page requires your ADMIN_TOKEN. Enter it once and it will be saved in your browser (local only).</div>

    <label>Admin Token</label>
    <input id="token" placeholder="e.g. dev_secret_token_123" />

    <div class="row">
      <div>
        <label>Headline</label>
        <textarea id="headline" placeholder="e.g. Ballarat council upgrades community health services"></textarea>
      </div>
    </div>

    <div class="row">
      <div>
        <label>Read More URL (optional)</label>
        <input id="readMoreUrl" placeholder="https://example.com/story" />
      </div>
      <div>
        <label>Hint (optional)</label>
        <input id="hint" placeholder="Starts with Ballarat..." />
      </div>
    </div>

    <button id="submitBtn">Submit Headline</button>

    <div id="out" class="msg">Ready.</div>
  </div>

  <script>
    const tokenEl = document.getElementById('token');
    const headlineEl = document.getElementById('headline');
    const readMoreUrlEl = document.getElementById('readMoreUrl');
    const hintEl = document.getElementById('hint');
    const outEl = document.getElementById('out');
    const btn = document.getElementById('submitBtn');

    // Load token from localStorage
    const saved = localStorage.getItem('civicPuzzle.adminToken');
    if (saved) tokenEl.value = saved;

    function setMsg(msg) {
      outEl.textContent = msg;
    }

    async function postHeadline() {
      const token = (tokenEl.value || '').trim();
      const headline = (headlineEl.value || '').trim();
      const readMoreUrl = (readMoreUrlEl.value || '').trim();
      const hint = (hintEl.value || '').trim();

      if (!token) return setMsg("❌ Please enter ADMIN_TOKEN first.");
      if (!headline) return setMsg("❌ Headline is required.");

      localStorage.setItem('civicPuzzle.adminToken', token);

      btn.disabled = true;
      setMsg("Submitting...");

      try {
        const res = await fetch('/api/headlines', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ headline, readMoreUrl, hint })
        });

        const text = await res.text();

        if (!res.ok) {
          setMsg(`❌ Error ${res.status}: ${text}`);
          return;
        }

        setMsg(`✅ Success:\n${text}`);
        headlineEl.value = '';
        readMoreUrlEl.value = '';
        hintEl.value = '';
      } catch (e) {
        setMsg("❌ Network or server error: " + e.message);
      } finally {
        btn.disabled = false;
      }
    }

    btn.addEventListener('click', postHeadline);
  </script>
</body>
</html>
